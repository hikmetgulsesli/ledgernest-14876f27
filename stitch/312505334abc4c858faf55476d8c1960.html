<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LedgerNest - Edit Client</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error-container": "#ffdad6",
                        "surface-variant": "#e1e2ed",
                        "on-surface": "#191b23",
                        "tertiary-container": "#007d55",
                        "secondary-fixed": "#d3e4fe",
                        "surface-container-low": "#f3f3fe",
                        "secondary-container": "#d0e1fb",
                        "on-error-container": "#93000a",
                        "tertiary": "#006242",
                        "surface-bright": "#faf8ff",
                        "surface-tint": "#0053db",
                        "on-surface-variant": "#434655",
                        "on-primary-fixed": "#00174b",
                        "on-secondary-fixed": "#0b1c30",
                        "primary-container": "#2563eb",
                        "on-tertiary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#4edea3",
                        "on-tertiary-container": "#bdffdb",
                        "primary-fixed": "#dbe1ff",
                        "on-tertiary-fixed": "#002113",
                        "outline": "#737686",
                        "inverse-on-surface": "#f0f0fb",
                        "primary": "#004ac6",
                        "secondary-fixed-dim": "#b7c8e1",
                        "surface-dim": "#d9d9e5",
                        "primary-fixed-dim": "#b4c5ff",
                        "outline-variant": "#c3c6d7",
                        "surface-container-high": "#e7e7f3",
                        "on-secondary-fixed-variant": "#38485d",
                        "on-background": "#191b23",
                        "error": "#ba1a1a",
                        "background": "#faf8ff",
                        "on-primary-container": "#eeefff",
                        "tertiary-fixed": "#6ffbbe",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#005236",
                        "on-primary-fixed-variant": "#003ea8",
                        "secondary": "#505f76",
                        "surface-container": "#ededf9",
                        "on-primary": "#ffffff",
                        "inverse-primary": "#b4c5ff",
                        "inverse-surface": "#2e3039",
                        "surface-container-highest": "#e1e2ed",
                        "on-error": "#ffffff",
                        "on-secondary-container": "#54647a",
                        "surface": "#faf8ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "sm": "8px",
                        "base": "4px",
                        "xl": "32px",
                        "margin-desktop": "32px",
                        "gutter": "16px",
                        "xs": "4px",
                        "margin-mobile": "16px",
                        "lg": "24px",
                        "md": "16px",
                        "max-width": "1440px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "display-sm": ["Inter"],
                        "body-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "label-md": ["Inter"],
                        "title-lg": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "display-sm": ["30px", { "lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "body-sm": ["13px", { "lineHeight": "18px", "fontWeight": "400" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-sm": ["11px", { "lineHeight": "14px", "fontWeight": "600" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "title-lg": ["18px", { "lineHeight": "28px", "fontWeight": "500" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface h-full flex flex-col antialiased">
<!-- Header Section (No Global Nav Shell as per instructions for sub-pages) -->
<header class="bg-surface-container-lowest border-b border-outline-variant px-margin-desktop py-lg flex items-center justify-between sticky top-0 z-10">
<div class="flex items-center gap-md">
<button aria-label="Go back" class="text-on-surface-variant hover:text-on-surface transition-colors flex items-center justify-center p-sm rounded-lg hover:bg-surface-container-low">
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_back">arrow_back</span>
</button>
<div>
<nav class="flex items-center text-on-surface-variant font-label-md text-label-md mb-xs gap-sm">
<a class="hover:text-primary transition-colors" href="#">Clients</a>
<span class="material-symbols-outlined text-[14px]" data-icon="chevron_right">chevron_right</span>
<span class="text-on-surface">Edit Client</span>
</nav>
<div class="flex items-center gap-md">
<h1 class="font-headline-lg text-headline-lg text-on-surface">Acme Corp</h1>
<span class="bg-[#fef3c7] text-[#92400e] px-sm py-[2px] rounded-full font-label-sm text-label-sm border border-[#fde68a]">Changes not saved</span>
</div>
</div>
</div>
<div class="flex items-center gap-sm">
<button class="h-[36px] px-md rounded border border-outline-variant text-on-surface font-label-md text-label-md hover:bg-surface-container-low transition-colors" data-action="ACT_CANCEL_EDIT">
                Cancel
            </button>
<button class="h-[36px] px-md rounded bg-primary-container text-on-primary font-label-md text-label-md hover:bg-primary transition-colors shadow-sm" data-action="ACT_SAVE_RECORD">
                Save Client
            </button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto p-margin-mobile md:p-margin-desktop pb-xl">
<div class="max-w-[800px] mx-auto w-full grid gap-lg">
<form class="grid gap-xl" id="client-form">
<!-- General Information Section -->
<section class="bg-surface-container-lowest rounded-xl border border-outline-variant overflow-hidden">
<div class="px-lg py-md border-b border-outline-variant bg-surface-container-low">
<h2 class="font-title-lg text-title-lg text-on-surface">General Information</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Core details for client identification and communication.</p>
</div>
<div class="p-lg grid gap-lg">
<div class="grid md:grid-cols-2 gap-lg">
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-secondary" for="client_name">
                                    Client Name <span class="text-error">*</span>
</label>
<input class="h-[36px] px-md rounded border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:border-primary-container focus:ring-2 focus:ring-[#bfdbfe] outline-none transition-all placeholder:text-on-surface-variant/50" id="client_name" name="client_name" type="text" value="Acme Corp"/>
</div>
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-secondary" for="tax_id">
                                    Tax ID / VAT Number
                                </label>
<input class="h-[36px] px-md rounded border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:border-primary-container focus:ring-2 focus:ring-[#bfdbfe] outline-none transition-all placeholder:text-on-surface-variant/50" id="tax_id" name="tax_id" placeholder="Optional" type="text"/>
</div>
</div>
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-error" for="billing_email">
                                Billing Email <span class="text-error">*</span>
</label>
<div class="relative">
<input class="h-[36px] w-full px-md pr-xl rounded border border-error bg-error-container/10 text-on-surface font-body-md text-body-md focus:border-error focus:ring-2 focus:ring-[#fecaca] outline-none transition-all" id="billing_email" name="billing_email" type="email" value="billing_at_acme.com"/>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-[18px] text-error" data-icon="error">error</span>
</div>
<span class="font-body-sm text-body-sm text-error flex items-center gap-xs mt-base">
                                Invalid email format
                            </span>
</div>
</div>
</section>
<!-- Business Address Section -->
<section class="bg-surface-container-lowest rounded-xl border border-outline-variant overflow-hidden">
<div class="px-lg py-md border-b border-outline-variant bg-surface-container-low">
<h2 class="font-title-lg text-title-lg text-on-surface">Business Address</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Used for invoice generation and formal correspondence.</p>
</div>
<div class="p-lg grid gap-lg">
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-secondary" for="street_address">
                                Street Address
                            </label>
<input class="h-[36px] px-md rounded border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:border-primary-container focus:ring-2 focus:ring-[#bfdbfe] outline-none transition-all placeholder:text-on-surface-variant/50" id="street_address" name="street_address" placeholder="123 Business Rd, Suite 100" type="text"/>
</div>
<div class="grid md:grid-cols-2 gap-lg">
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-secondary" for="city">
                                    City
                                </label>
<input class="h-[36px] px-md rounded border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:border-primary-container focus:ring-2 focus:ring-[#bfdbfe] outline-none transition-all placeholder:text-on-surface-variant/50" id="city" name="city" placeholder="Metropolis" type="text"/>
</div>
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-secondary" for="postal_code">
                                    Postal Code
                                </label>
<input class="h-[36px] px-md rounded border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:border-primary-container focus:ring-2 focus:ring-[#bfdbfe] outline-none transition-all placeholder:text-on-surface-variant/50" id="postal_code" name="postal_code" placeholder="10001" type="text"/>
</div>
</div>
</div>
</section>
</form>
</div>
</main>
</body></html>
